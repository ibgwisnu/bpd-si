<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BPD Analytica Enterprise v3.0</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .input-group label { display: block; font-size: 0.7rem; font-weight: 700; color: #64748b; text-transform: uppercase; margin-bottom: 4px; margin-left: 2px; }
        .glass-card { background: white; border: 1px solid #e2e8f0; border-radius: 1.25rem; }
        .loading-overlay { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.8); z-index: 999; justify-content: center; align-items: center; color: white; flex-direction: column; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="loading" class="loading-overlay">
        <div class="animate-spin rounded-full h-12 w-12 border-4 border-blue-500 border-t-transparent mb-4"></div>
        <p class="font-bold tracking-widest">SINKRONISASI CLOUD...</p>
    </div>

    <header class="bg-slate-900 text-white p-6 rounded-3xl shadow-2xl mb-8 flex flex-col lg:flex-row justify-between items-center gap-6">
        <div class="text-center lg:text-left">
            <h1 class="text-3xl font-extrabold tracking-tight italic">BPD<span class="text-blue-400">Analytica</span> <span class="text-sm font-light border border-blue-400 px-2 py-1 rounded-full ml-2 not-italic">Enterprise v3.0</span></h1>
            <p class="text-slate-400 text-sm mt-1">Sistem Database Online & Ranking Regional BPD se-Indonesia</p>
        </div>
        <div class="flex flex-wrap justify-center gap-3 no-print">
            <button onclick="downloadTemplate()" class="bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-xl text-xs font-bold transition">Template Excel</button>
            <label class="bg-emerald-600 hover:bg-emerald-700 px-4 py-2 rounded-xl text-xs font-bold cursor-pointer transition">
                Import Excel <input type="file" id="importFile" class="hidden" accept=".xlsx, .xls" onchange="importExcel(event)">
            </label>
            <button onclick="exportExcel()" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-xl text-xs font-bold transition">Export Master</button>
            <button onclick="window.print()" class="bg-white text-slate-900 hover:bg-slate-100 px-4 py-2 rounded-xl text-xs font-bold transition">Cetak PDF</button>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <div class="lg:col-span-4 no-print">
            <div class="glass-card p-6 shadow-sm sticky top-6 max-h-[90vh] overflow-y-auto">
                <h2 class="text-lg font-bold mb-6 text-slate-800 flex items-center gap-2">
                    <div class="w-1.5 h-5 bg-blue-600 rounded-full"></div> Entry Data Cloud
                </h2>
                <form id="bankForm" class="space-y-6">
                    <div class="grid grid-cols-2 gap-4 border-b pb-4">
                        <div class="col-span-2 input-group">
                            <label>Bank BPD</label>
                            <select id="bankName" class="w-full p-2.5 border rounded-xl bg-slate-50 outline-none focus:ring-2 focus:ring-blue-500">
                                <option value="">-- Pilih Bank --</option>
                                <option>BPD BJB</option><option>BPD JATIM</option><option>BPD JATENG</option><option>BPD DKI</option>
                                <option>BPD KALTIMTARA</option><option>BPD SUMUT</option><option>BPD PAPUA</option>
                                <option>BPD SUMSELBABEL</option><option>BPD BALI</option><option>BPD NAGARI</option>
                                <option>BPD SULSELBAR</option><option>BPD RIAUKEPRI</option><option>BPD ACEH</option>
                                <option>BPD KALSEL</option><option>BPD KALBAR</option><option>BPD SULUTGO</option>
                                <option>BPD DIY</option><option>BPD NTT</option><option>BPD KALTENG</option>
                                <option>BPD NTB SYARIAH</option><option>BPD SULTRA</option><option>BPD JAMBI</option>
                                <option>BPD SULTENG</option><option>BPD LAMPUNG</option><option>BPD MALUKU</option>
                                <option>BPD BENGKULU</option><option>BPD BANTEN</option>
                            </select>
                        </div>
                        <div class="input-group"><label>Tahun</label><input type="number" id="tahun" class="w-full p-2 border rounded-xl"></div>
                        <div class="input-group">
                            <label>Bulan</label>
                            <select id="bulan" onchange="toggleRasio()" class="w-full p-2 border rounded-xl">
                                <option value="1">Januari</option><option value="2">Februari</option><option value="3">Maret</option>
                                <option value="4">April</option><option value="5">Mei</option><option value="6">Juni</option>
                                <option value="7">Juli</option><option value="8">Agustus</option><option value="9">September</option>
                                <option value="10">Oktober</option><option value="11">November</option><option value="12">Desember</option>
                            </select>
                        </div>
                    </div>

                    <div class="space-y-4">
                        <h3 class="text-xs font-black text-blue-600 uppercase tracking-widest flex justify-between">
                            Pos Keuangan <span class="lowercase font-normal text-slate-400">jutaan rp</span>
                        </h3>
                        <div class="grid grid-cols-2 gap-3">
                            <div class="input-group"><label>Aset</label><input type="number" id="aset" class="w-full p-2 border rounded-lg text-sm"></div>
                            <div class="input-group"><label>Kredit</label><input type="number" id="kredit" class="w-full p-2 border rounded-lg text-sm"></div>
                            <div class="input-group"><label>Giro</label><input type="number" id="giro" oninput="calcLogic()" class="w-full p-2 border rounded-lg text-sm"></div>
                            <div class="input-group"><label>Tabungan</label><input type="number" id="tabungan" oninput="calcLogic()" class="w-full p-2 border rounded-lg text-sm"></div>
                            <div class="input-group"><label>Deposito</label><input type="number" id="deposito" oninput="calcLogic()" class="w-full p-2 border rounded-lg text-sm"></div>
                            <div class="input-group"><label>Total DPK</label><input type="number" id="dpk" class="w-full p-2 border rounded-lg text-sm bg-slate-100 font-bold" readonly></div>
                            <div class="input-group"><label>Laba</label><input type="number" id="laba" class="w-full p-2 border rounded-lg text-sm"></div>
                            <div class="input-group"><label>CKPN</label><input type="number" id="ckpn" class="w-full p-2 border rounded-lg text-sm"></div>
                        </div>
                    </div>

                    <div id="rasioSection" class="hidden space-y-4 bg-orange-50 p-4 rounded-2xl border border-orange-100">
                        <h3 class="text-xs font-black text-orange-600 uppercase tracking-widest flex justify-between">
                            Rasio Keuangan <span class="lowercase font-normal text-orange-400">%</span>
                        </h3>
                        <div class="grid grid-cols-2 gap-3">
                            <div class="input-group"><label>KPMM</label><input type="number" id="kpmm" class="w-full p-2 border rounded-lg text-sm"></div>
                            <div class="input-group"><label>ROA</label><input type="number" id="roa" class="w-full p-2 border rounded-lg text-sm"></div>
                            <div class="input-group"><label>ROE</label><input type="number" id="roe" class="w-full p-2 border rounded-lg text-sm"></div>
                            <div class="input-group"><label>NPL Gross</label><input type="number" id="nplg" class="w-full p-2 border rounded-lg text-sm"></div>
                            <div class="input-group"><label>NPL Net</label><input type="number" id="npln" class="w-full p-2 border rounded-lg text-sm"></div>
                            <div class="input-group"><label>BOPO</label><input type="number" id="bopo" class="w-full p-2 border rounded-lg text-sm"></div>
                            <div class="input-group"><label>NIM</label><input type="number" id="nim" class="w-full p-2 border rounded-lg text-sm"></div>
                            <div class="input-group"><label>LDR</label><input type="number" id="ldr" class="w-full p-2 border rounded-lg text-sm"></div>
                            <div class="input-group"><label>CASA (%)</label><input type="number" id="casa" class="w-full p-2 border rounded-lg text-sm bg-white font-bold" readonly></div>
                        </div>
                    </div>

                    <button type="button" onclick="pushToCloud()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold hover:bg-blue-600 transition-all shadow-lg">SIMPAN KE DATABASE CLOUD</button>
                </form>
            </div>
        </div>

        <div class="lg:col-span-8 space-y-8">
            <div class="glass-card p-6 flex flex-wrap items-center justify-between gap-4">
                <div class="flex items-center gap-4">
                    <div class="input-group !mb-0">
                        <label>Filter Periode</label>
                        <div class="flex gap-2">
                            <select id="filterBulan" onchange="fetchFromCloud()" class="p-2 border rounded-xl text-sm font-bold bg-white">
                                <option value="1">Januari</option><option value="2">Februari</option><option value="3">Maret</option>
                                <option value="4">April</option><option value="5">Mei</option><option value="6">Juni</option>
                                <option value="7">Juli</option><option value="8">Agustus</option><option value="9">September</option>
                                <option value="10">Oktober</option><option value="11">November</option><option value="12">Desember</option>
                            </select>
                            <input type="number" id="filterTahun" oninput="fetchFromCloud()" class="w-24 p-2 border rounded-xl text-sm font-bold text-center">
                        </div>
                    </div>
                </div>
                <div class="flex bg-slate-100 p-1.5 rounded-xl gap-1">
                    <button onclick="changeMetric('aset')" id="btnAset" class="px-5 py-2 rounded-lg text-xs font-bold bg-white shadow-sm text-blue-600">ASET</button>
                    <button onclick="changeMetric('laba')" id="btnLaba" class="px-5 py-2 rounded-lg text-xs font-bold text-slate-500">LABA</button>
                    <button onclick="changeMetric('kredit')" id="btnKredit" class="px-5 py-2 rounded-lg text-xs font-bold text-slate-500">KREDIT</button>
                </div>
            </div>

            <div class="glass-card p-8">
                <h2 class="text-xl font-bold text-slate-800 mb-6 flex justify-between">
                    Visualisasi Ranking Regional
                    <span id="labelPeriode" class="text-sm font-normal text-slate-400 tracking-widest"></span>
                </h2>
                <div class="h-[400px]">
                    <canvas id="mainChart"></canvas>
                </div>
            </div>

            <div class="glass-card overflow-hidden">
                <div class="p-6 border-b flex justify-between items-center">
                    <h2 class="text-xl font-bold text-slate-800">Peringkat Bank Regional</h2>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 border-b">
                            <tr>
                                <th class="p-4 text-[10px] font-black text-slate-400 uppercase">Rank</th>
                                <th class="p-4 text-[10px] font-black text-slate-400 uppercase">Bank BPD</th>
                                <th class="p-4 text-right text-[10px] font-black text-slate-400 uppercase">Aset (Juta)</th>
                                <th class="p-4 text-right text-[10px] font-black text-slate-400 uppercase">Laba (Juta)</th>
                                <th class="p-4 text-center text-[10px] font-black text-slate-400 uppercase">CASA</th>
                            </tr>
                        </thead>
                        <tbody id="rankingTableBody" class="divide-y divide-slate-100">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // PENTING: GANTI DENGAN URL FIREBASE ANDA SENDIRI
        const FIREBASE_URL = "https://monitoring-bpd-default-rtdb.asia-southeast1.firebasedatabase.app"; 

        let chart;
        let activeMetric = 'aset';

        window.onload = () => {
            const now = new Date();
            document.getElementById('tahun').value = now.getFullYear();
            document.getElementById('filterTahun').value = now.getFullYear();
            document.getElementById('filterBulan').value = now.getMonth() + 1;
            fetchFromCloud();
        };

        function calcLogic() {
            const g = parseFloat(document.getElementById('giro').value) || 0;
            const t = parseFloat(document.getElementById('tabungan').value) || 0;
            const d = parseFloat(document.getElementById('deposito').value) || 0;
            const total = g + t + d;
            document.getElementById('dpk').value = total;
            document.getElementById('casa').value = total > 0 ? (((g + t) / total) * 100).toFixed(2) : 0;
        }

        function toggleRasio() {
            const b = parseInt(document.getElementById('bulan').value);
            document.getElementById('rasioSection').classList.toggle('hidden', ![3, 6, 9, 12].includes(b));
        }

        async function pushToCloud() {
            const bank = document.getElementById('bankName').value;
            const bln = document.getElementById('bulan').value;
            const thn = document.getElementById('tahun').value;
            if(!bank) return alert("Pilih Nama Bank!");

            const data = {
                bank, 
                bulan: parseInt(bln), 
                tahun: parseInt(thn),
                aset: parseFloat(document.getElementById('aset').value) || 0,
                kredit: parseFloat(document.getElementById('kredit').value) || 0,
                laba: parseFloat(document.getElementById('laba').value) || 0,
                dpk: parseFloat(document.getElementById('dpk').value) || 0,
                casa: parseFloat(document.getElementById('casa').value) || 0,
                kpmm: parseFloat(document.getElementById('kpmm').value) || 0,
                roa: parseFloat(document.getElementById('roa').value) || 0,
                nplg: parseFloat(document.getElementById('nplg').value) || 0
            };

            const id = `${bank}-${bln}-${thn}`.replace(/\s/g, '_');
            document.getElementById('loading').style.display = 'flex';
            
            try {
                await fetch(`${FIREBASE_URL}/data/${id}.json`, {
                    method: 'PUT',
                    body: JSON.stringify(data)
                });
                alert("Data Tersimpan di Cloud!");
                fetchFromCloud();
            } catch (e) { alert("Gagal Simpan ke Cloud."); }
            document.getElementById('loading').style.display = 'none';
        }

        async function fetchFromCloud() {
            const fb = parseInt(document.getElementById('filterBulan').value);
            const ft = parseInt(document.getElementById('filterTahun').value);
            
            try {
                const res = await fetch(`${FIREBASE_URL}/data.json`);
                const allData = await res.json();
                let filtered = [];
                if(allData) {
                    filtered = Object.values(allData).filter(i => i.bulan === fb && i.tahun === ft);
                }
                renderUI(filtered);
            } catch (e) { console.error("Cloud connection failed."); }
        }

        function renderUI(data) {
            data.sort((a,b) => b[activeMetric] - a[activeMetric]);
            
            // Label
            document.getElementById('labelPeriode').innerText = `BULAN ${document.getElementById('filterBulan').value} / ${document.getElementById('filterTahun').value}`;

            // Table
            const tbody = document.getElementById('rankingTableBody');
            tbody.innerHTML = data.length ? '' : '<tr><td colspan="5" class="p-12 text-center text-slate-400 italic">Data belum tersedia untuk periode ini</td></tr>';
            
            data.forEach((item, idx) => {
                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50 transition">
                        <td class="p-4 font-black text-slate-300">#${idx + 1}</td>
                        <td class="p-4 font-bold text-slate-700">${item.bank}</td>
                        <td class="p-4 text-right font-semibold text-slate-600">${item.aset.toLocaleString()}</td>
                        <td class="p-4 text-right font-bold text-emerald-600">${item.laba.toLocaleString()}</td>
                        <td class="p-4 text-center"><span class="bg-blue-50 text-blue-600 px-3 py-1 rounded-full text-[10px] font-black">${item.casa}%</span></td>
                    </tr>`;
            });

            // Chart
            const ctx = document.getElementById('mainChart').getContext('2d');
            if (chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: data.map(i => i.bank),
                    datasets: [{
                        label: activeMetric.toUpperCase(),
                        data: data.map(i => i[activeMetric]),
                        backgroundColor: '#3b82f6',
                        borderRadius: 8
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        function changeMetric(m) {
            activeMetric = m;
            ['btnAset', 'btnLaba', 'btnKredit'].forEach(id => {
                document.getElementById(id).classList.remove('bg-white', 'shadow-sm', 'text-blue-600');
                document.getElementById(id).classList.add('text-slate-500');
            });
            const activeId = 'btn' + m.charAt(0).toUpperCase() + m.slice(1);
            document.getElementById(activeId).classList.add('bg-white', 'shadow-sm', 'text-blue-600');
            fetchFromCloud();
        }

        function downloadTemplate() {
            const headers = [["Nama Bank", "Tahun", "Bulan", "Aset", "Kredit", "Giro", "Tabungan", "Deposito", "Laba"]];
            const ws = XLSX.utils.aoa_to_sheet(headers);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Template");
            XLSX.writeFile(wb, "Template_BPD_Cloud.xlsx");
        }

        async function importExcel(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = async (event) => {
                const dataRaw = new Uint8Array(event.target.result);
                const workbook = XLSX.read(dataRaw, {type: 'array'});
                const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);

                document.getElementById('loading').style.display = 'flex';
                for(let row of rows) {
                    const id = `${row["Nama Bank"]}-${row["Bulan"]}-${row["Tahun"]}`.replace(/\s/g, '_');
                    const dpk = (row["Giro"]||0) + (row["Tabungan"]||0) + (row["Deposito"]||0);
                    const item = {
                        bank: row["Nama Bank"], tahun: row["Tahun"], bulan: row["Bulan"],
                        aset: row["Aset"]||0, kredit: row["Kredit"]||0, laba: row["Laba"]||0,
                        dpk: dpk, casa: dpk > 0 ? (((row["Giro"]||0) + (row["Tabungan"]||0))/dpk*100).toFixed(2) : 0
                    };
                    await fetch(`${FIREBASE_URL}/data/${id}.json`, { method: 'PUT', body: JSON.stringify(item) });
                }
                document.getElementById('loading').style.display = 'none';
                alert("Import Berhasil disinkronkan ke Cloud!");
                fetchFromCloud();
            };
            reader.readAsArrayBuffer(file);
        }

        async function exportExcel() {
            const res = await fetch(`${FIREBASE_URL}/data.json`);
            const data = await res.json();
            if(!data) return alert("Database Kosong.");
            const ws = XLSX.utils.json_to_sheet(Object.values(data));
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Database_BPD");
            XLSX.writeFile(wb, "Master_Data_Cloud_BPD.xlsx");
        }
    </script>
</body>
</html>
