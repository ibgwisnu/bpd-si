        html { display: none; }

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Menggunakan Config yang sama dengan Portal Utama
        const firebaseConfig = {
            apiKey: "AIzaSyAbRJOnNflibNNILN0fVdHv58DT9AfX7qY",
            authDomain: "e-monitoring-bpd-bali.firebaseapp.com",
            projectId: "e-monitoring-bpd-bali",
            storageBucket: "e-monitoring-bpd-bali.firebasestorage.app",
            messagingSenderId: "96169455366",
            appId: "1:96169455366:web:b0730456a919a6e02af887",
            measurementId: "G-3QV1N5V3KD"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Cek status login sebelum merender halaman
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Jika user login ditemukan, munculkan halaman
                document.documentElement.style.display = "block";
                console.log("Akses diberikan untuk:", user.email);
            } else {
                // Jika tidak login, tendang kembali ke Portal Utama
                window.location.href = "https://e-monitoring.netlify.app/?status=unauthorized";
            }
        });
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
