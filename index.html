<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BPD SI Monitoring</title>

    <style>
        /* Mencegah kebocoran data sebelum login terverifikasi */
        html { display: none; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAbRJOnNflibNNILN0fVdHv58DT9AfX7qY",
            authDomain: "e-monitoring-bpd-bali.firebaseapp.com",
            projectId: "e-monitoring-bpd-bali",
            storageBucket: "e-monitoring-bpd-bali.firebasestorage.app",
            messagingSenderId: "96169455366",
            appId: "1:96169455366:web:b0730456a919a6e02af887",
            measurementId: "G-3QV1N5V3KD"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Fungsi pengecekan status login
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // USER TERDETEKSI: Tampilkan halaman
                document.documentElement.style.display = "block";
            } else {
                // USER TIDAK ADA: Tendang ke portal utama
                // Kita tambahkan sedikit delay agar Firebase punya waktu mencari session
                setTimeout(() => {
                    if (!auth.currentUser) {
                        window.location.href = "https://e-monitoring.netlify.app/?status=unauthorized";
                    } else {
                        document.documentElement.style.display = "block";
                    }
                }, 1500); 
            }
        });
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-slate-50">
    <div class="p-10">
        <h1 class="text-2xl font-bold">Dashboard BPD SI</h1>
        <p>Jika Anda melihat ini, berarti Anda berhasil login.</p>
        <a href="https://e-monitoring.netlify.app/" class="text-blue-500 underline">Kembali ke Portal</a>
    </div>
</body>
</html>
