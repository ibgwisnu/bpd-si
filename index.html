<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BPD SI Monitoring</title>

    <style>
        /* Sembunyikan halaman agar tidak berkedip (flash) */
        html { display: none; background-color: #f8fafc; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAbRJOnNflibNNILN0fVdHv58DT9AfX7qY",
            authDomain: "e-monitoring-bpd-bali.firebaseapp.com",
            projectId: "e-monitoring-bpd-bali",
            storageBucket: "e-monitoring-bpd-bali.firebasestorage.app",
            messagingSenderId: "96169455366",
            appId: "1:96169455366:web:b0730456a919a6e02af887"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Fungsi pengecekan keamanan
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                try {
                    // Ambil NRK dari email
                    const nrk = user.email.split('@')[0];
                    const userDocRef = doc(db, "users", nrk);
                    const userSnap = await getDoc(userDocRef);

                    if (userSnap.exists()) {
                        const userData = userSnap.data();
                        
                        // Cek apakah user sudah di-approve oleh Pak Wisnu
                        if (userData.status === "approved" || userData.role === "superadmin") {
                            document.documentElement.style.display = "block";
                        } else {
                            alert("Akun Anda terdaftar namun belum disetujui Admin.");
                            window.location.href = "https://e-monitoring.netlify.app/?status=pending";
                        }
                    } else {
                        // Jika data di Firestore tidak ada
                        window.location.href = "https://e-monitoring.netlify.app/?status=no_profile";
                    }
                } catch (error) {
                    console.error("Auth Error:", error);
                    window.location.href = "https://e-monitoring.netlify.app/?status=error";
                }
            } else {
                // Jika setelah ditunggu sesi login tetap tidak ada
                // Beri waktu 2 detik (2000ms) untuk Firebase mencari cookie login
                setTimeout(() => {
                    if (!auth.currentUser) {
                        window.location.href = "https://e-monitoring.netlify.app/?status=unauthorized";
                    }
                }, 2000);
            }
        });
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-slate-50 font-sans">
    
    <nav class="bg-white border-b border-slate-200 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="text-2xl">🏦</span>
                <span class="font-black text-slate-800 tracking-tighter uppercase">BPD SI Dashboard</span>
            </div>
            <a href="https://e-monitoring.netlify.app/" class="text-xs font-bold text-blue-600 border border-blue-100 px-4 py-2 rounded-full hover:bg-blue-50 transition">
                KEMBALI KE PORTAL
            </a>
        </div>
    </nav>

    <main class="p-8 max-w-7xl mx-auto">
        <div id="dashboard-content">
            <h1 class="text-xl font-bold">Memuat Data Monitoring...</h1>
        </div>
    </main>

</body>
</html>
